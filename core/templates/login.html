{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5 col-lg-4">
        
        <div class="glass-card p-5 text-center position-relative">
            <div style="position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 80px; height: 5px; background: var(--neon-green); box-shadow: 0 0 20px var(--neon-green); border-radius: 10px;"></div>

            <h2 class="mb-2 fw-bold text-white">SYSTEM ACCESS</h2>
            <p class="text-muted mb-4 small">SECURE VENDOR PORTAL</p>
            
            <form method="post">
                {% csrf_token %}
                <div class="mb-3 text-start">
                    <label class="form-label text-uppercase small fw-bold" style="color: var(--neon-blue);">Username</label>
                    <input type="text" name="username" class="form-control bg-transparent text-white border-secondary" placeholder="ID Number" style="background: rgba(0,0,0,0.3) !important;" required>
                </div>
                
                <div class="mb-4 text-start">
                    <label class="form-label text-uppercase small fw-bold" style="color: var(--neon-blue);">Password</label>
                    <input type="password" name="password" class="form-control bg-transparent text-white border-secondary" placeholder="••••••••" style="background: rgba(0,0,0,0.3) !important;" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-3">
                    AUTHENTICATE <i class="bi bi-shield-lock-fill ms-2"></i>
                </button>
            </form>
            
            <div class="mt-4 pt-3 border-top border-secondary">
                <p class="text-muted small mb-0">
                    <i class="bi bi-check-circle-fill text-success me-1"></i> 256-Bit SSL Encrypted
                </p>
                <p class="text-muted small mt-1">www.FASTCREDENTIALS.com</p>
            </div>
        </div>

    </div>
</div>
{% endblock %}
