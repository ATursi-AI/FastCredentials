{% extends 'base.html' %}

{% block content %}
<style>
    /* Custom Glass Styling just for this page */
    .login-glass {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 16px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        position: relative;
        overflow: hidden;
    }
    
    .login-accent-line {
        height: 6px;
        background: linear-gradient(90deg, var(--primary-brand), var(--accent-brand));
        width: 100%;
        position: absolute;
        top: 0;
        left: 0;
    }

    .login-glass h2, .login-glass h3, .login-glass p, .login-glass label {
        color: var(--primary-brand) !important;
    }
    
    .form-floating > .form-control {
        background-color: #F8FAFC !important;
        border: 1px solid #CBD5E1 !important;
        color: #0F172A !important;
    }
    .form-floating > .form-control:focus {
        border-color: var(--accent-brand) !important;
        box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.1) !important;
        background-color: #ffffff !important;
    }
    .form-floating > label {
        color: #64748B !important;
    }
</style>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        
        <div class="login-glass p-5">
            <div class="login-accent-line"></div>

            <div class="text-center mb-4 mt-2">
                <i class="bi bi-shield-lock-fill" style="font-size: 3rem; color: var(--primary-brand);"></i>
                <h2 class="fw-bold mt-2 mb-1" style="letter-spacing: -1px;">MEMBER LOGIN</h2>
                <p class="small text-uppercase fw-bold opacity-75" style="letter-spacing: 2px;">Secure Access Portal</p>
            </div>
            
            <form method="post">
                {% csrf_token %}
                
                {% if form.errors %}
                <div class="alert alert-danger py-2 small border-0 mb-3 text-center" role="alert">
                    Invalid credentials. Please try again.
                </div>
                {% endif %}

                <div class="form-floating mb-3">
                    <input type="email" name="username" class="form-control" id="floatingInput" placeholder="name@example.com" required>
                    <label for="floatingInput">Email Address</label>
                </div>
                
                <div class="form-floating mb-4">
                    <input type="password" name="password" class="form-control" id="floatingPassword" placeholder="Password" required>
                    <label for="floatingPassword">Password</label>
                </div>
                
                <button type="submit" class="btn w-100 py-3 fw-bold text-white shadow-sm" 
                        style="background: var(--primary-brand); border-radius: 8px; font-size: 1.1rem; transition: all 0.2s;">
                    AUTHENTICATE
                </button>
            </form>
            
            <div class="text-center mt-4 d-flex justify-content-between align-items-center">
                <a href="{% url 'home' %}" class="text-decoration-none small fw-bold" style="color: #64748B;">
                    <i class="bi bi-arrow-left me-1"></i> Back Home
                </a>
                <a href="#" class="text-decoration-none small fw-bold" style="color: var(--accent-brand);">
                    Forgot Password?
                </a>
            </div>

            <div class="text-center mt-4 pt-3 border-top" style="border-color: rgba(0,0,0,0.05) !important;">
                <small style="color: #94A3B8; font-size: 0.7rem;">
                    <i class="bi bi-lock-fill me-1"></i> 256-BIT ENCRYPTED CONNECTION
                </small>
            </div>
        </div>

    </div>
</div>
{% endblock %}
