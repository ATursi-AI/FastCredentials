{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5 col-lg-4">
        <div class="glass-card p-5 text-center">
            <h2 class="mb-3 fw-bold text-white">RESET PASSWORD</h2>
            <p class="text-muted mb-4 small">Enter your email to receive a reset link.</p>
            <form method="post">
                {% csrf_token %}
                <div class="mb-4 text-start">
                    <label class="form-label text-uppercase small fw-bold" style="color: var(--neon-blue);">Email Address</label>
                    <input type="email" name="email" class="form-control bg-transparent text-white border-secondary" required style="background: rgba(0,0,0,0.3) !important;">
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">SEND LINK</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
